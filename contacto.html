        <p>¿Tienes alguna pregunta o propuesta? Estoy disponible para ayudarte.</p>

<!-- SESION CONTACTO -->
<section class="contacto">
  <div class="container">

    <p class="contacto-texto">
      Envíame un mensaje y te responderé lo antes posible.
    </p>

    <div class="contacto-grid">

      <!-- FORMULARIO -->
      <div class="contacto-card">
        <form class="contacto-form">
          
          <label>Nombre:</label>
          <input type="text" required>

          <label>Correo:</label>
          <input type="email" required>

          <label>Mensaje:</label>
          <textarea rows="6" required></textarea>

          <button type="submit">Enviar mensaje</button>

        </form>
      </div>

      <!-- LADO DERECHO -->
      <div class="contacto-right">

        <!-- INFO -->
        <div class="contacto-card">
          <h3>Información de contacto</h3>

          <p><i class="fas fa-map-marker-alt"></i> Medellín, Colombia</p>
          <p><i class="fas fa-envelope"></i> klizarazo@ucompensar.edu.co</p>
          <p><i class="fas fa-phone"></i> +57 300 123 4567</p>
        </div>

        <!-- REDES -->
        <div class="contacto-card">
          <h3>Mis redes</h3>

          <div class="redes">
            <a href="https://co.linkedin.com/" target="_blank"><i class="fab fa-linkedin"></i></a>
            <a href="https://github.com/" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://www.instagram.com/?hl=es" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.youtube.com/" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://www.twitch.tv/" target="_blank"><i class="fab fa-twitch"></i></a>
          </div>

        </div>

      </div>

    </div>
